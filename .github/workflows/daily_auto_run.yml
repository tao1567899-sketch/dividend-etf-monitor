name: 红利ETF每日量化监控

on:
  schedule:
    # 北京时间 09:30 = UTC 01:30（工作日）
    - cron: "30 1 * * 1-5"
  workflow_dispatch:   # 支持手动触发

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行红利ETF监控主程序
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TUSHARE_API_URL: ${{ secrets.TUSHARE_API_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python dividend_etf_core.py
